<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Desktop Digital Life</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./digital-life.css">
</head>
<body>
  <main class="life-app" data-life-state="idle" data-side-open="false">
    <header class="life-topbar">
      <a class="back-link" href="/">Desktop Life</a>
      <div>
        <p>Digital Life</p>
        <h1>数字生命</h1>
      </div>
      <div class="top-status">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="hardwareMode">local</span>
        <button id="memoryToggle" type="button" aria-controls="memoryPanel" aria-expanded="false">记忆</button>
        <button id="modelToggle" type="button" aria-controls="modelPanel" aria-expanded="false">模型</button>
      </div>
    </header>

    <section class="life-stage" aria-label="Digital life companion workspace">
      <div class="companion-column">
        <section class="companion-screen" aria-labelledby="companionName">
          <div class="life-bezel">
            <div class="life-screen">
              <canvas id="lifeExpression" class="life-expression" aria-hidden="true"></canvas>
              <div class="life-screen-glow" aria-hidden="true"></div>
            </div>
            <div class="life-slot" aria-hidden="true"></div>
          </div>
          <div class="life-identity">
            <p id="lifeStateLabel">idle</p>
            <h2 id="companionName">Vibe</h2>
            <span id="lifeMood">calm</span>
          </div>
        </section>

      </div>

      <section class="conversation-panel" aria-label="Digital life conversation">
        <form class="model-panel" id="modelPanel" hidden>
          <label>
            <span>Provider</span>
            <select id="modelProvider">
              <option value="deepseek">DeepSeek</option>
              <option value="minimax">MiniMax</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label>
            <span>Base URL</span>
            <input id="modelBaseUrl" type="url" autocomplete="off" spellcheck="false">
          </label>
          <label>
            <span>Model</span>
            <input id="modelName" type="text" autocomplete="off" spellcheck="false">
          </label>
          <label>
            <span>API Key</span>
            <input id="modelApiKey" type="password" autocomplete="off" spellcheck="false">
          </label>
          <div class="model-actions">
            <span id="modelStatus">local fallback</span>
            <button class="primary-action" type="submit">Save</button>
          </div>
        </form>
        <div class="panel-head">
          <div class="chat-life-mini" aria-hidden="true">
            <canvas id="lifeExpressionMini" class="life-expression life-expression-mini"></canvas>
          </div>
          <div>
            <p>Companion Thread</p>
            <h2>今晚聊什么</h2>
          </div>
          <div class="thread-status">
            <span id="presenceLabel">presence unknown</span>
            <span id="runtimeLabel">quiet</span>
          </div>
        </div>
        <div class="message-log" id="messageLog" aria-live="polite"></div>
        <button class="new-message-notice" id="newMessagesNotice" type="button" hidden>新消息</button>
        <form class="life-composer" id="lifeComposer">
          <label for="lifeInput">Message</label>
          <textarea id="lifeInput" rows="3" placeholder="告诉她今天发生了什么，或者让她记住一件事"></textarea>
          <button class="primary-action" type="submit">Send</button>
        </form>
      </section>

      <button class="drawer-scrim" id="drawerScrim" type="button" aria-label="关闭记忆抽屉"></button>
      <aside class="memory-panel" id="memoryPanel" aria-label="Digital life memory" aria-hidden="true">
        <div class="drawer-head">
          <div>
            <p>Memory</p>
            <h2>记忆与内心</h2>
          </div>
          <button id="memoryClose" type="button" aria-label="关闭记忆抽屉">关闭</button>
        </div>
        <section class="control-panel" aria-label="Digital life advanced controls">
          <details class="memory-drawer advanced-drawer">
            <summary><span>Advanced</span><b>高级控制</b></summary>
            <div class="state-grid">
              <button type="button" data-life-state="idle" aria-pressed="true">Idle</button>
              <button type="button" data-life-state="sleep" aria-pressed="false">Sleep</button>
              <button type="button" data-life-state="listening" aria-pressed="false">Listen</button>
              <button type="button" data-life-state="thinking" aria-pressed="false">Think</button>
              <button type="button" data-life-state="speaking" aria-pressed="false">Speak</button>
              <button type="button" data-life-state="angry" aria-pressed="false">Angry</button>
              <button type="button" data-life-state="happy" aria-pressed="false">Happy</button>
              <button type="button" data-life-state="lonely" aria-pressed="false">Lonely</button>
              <button type="button" data-life-state="nearby" aria-pressed="false">Nearby</button>
              <button type="button" data-life-state="away" aria-pressed="false">Away</button>
            </div>
            <div class="action-row">
              <button class="primary-action" id="listenBtn" type="button">Listen</button>
              <button id="tickBtn" type="button">Heartbeat</button>
              <button id="reflectBtn" type="button">Reflect</button>
              <button id="refreshBtn" type="button">Refresh</button>
            </div>
            <div class="life-loop-row">
              <label><input id="loopToggle" type="checkbox"> autonomous rhythm</label>
              <span id="loopStatus">manual</span>
            </div>
          </details>
        </section>
        <section>
          <p>Vital State</p>
          <h2>生命体征</h2>
          <div class="inner-state-summary" id="innerStateSummary"></div>
          <div class="vitals-grid" id="vitalsGrid"></div>
          <div class="reward-row">
            <button id="rewardBtn" type="button">Reward</button>
            <button id="penaltyBtn" type="button">Penalty</button>
          </div>
        </section>
        <details class="memory-drawer mind-drawer">
          <summary><span>Inner Life</span><b>State</b></summary>
          <div class="mind-panel" id="mindPanel" aria-live="polite"></div>
        </details>
        <section>
          <p>Autonomy</p>
          <h2>自主活动</h2>
          <div class="autonomy-summary" id="autonomySummary"></div>
          <div class="action-list" id="actionList"></div>
        </section>
        <details class="memory-drawer">
          <summary><span>World Input</span><b>网页感知</b></summary>
          <form class="web-form" id="webForm">
            <label for="webUrl">URL</label>
            <input id="webUrl" type="url" placeholder="https://example.com">
            <button type="submit">Read</button>
          </form>
        </details>
        <details class="memory-drawer" open>
          <summary><span>Abstraction</span><b>抽象思考</b></summary>
          <div class="cognition-summary" id="cognitionSummary"></div>
          <div class="cognition-list" id="cognitionList"></div>
        </details>
        <details class="memory-drawer">
          <summary><span>Long Memory</span><b>她记得什么</b></summary>
          <form class="memory-form" id="memoryForm">
            <label for="memoryTitle">Memory title</label>
            <input id="memoryTitle" type="text" placeholder="记忆标题">
            <label for="memoryContent">Memory content</label>
            <textarea id="memoryContent" rows="3" placeholder="把你希望她长期记住的事写在这里"></textarea>
            <button type="submit">Remember</button>
          </form>
          <div class="memory-list" id="memoryList"></div>
        </details>
        <details class="memory-drawer">
          <summary><span>Journal</span><b>今日反思</b></summary>
          <div class="journal-list" id="journalList"></div>
        </details>
      </aside>
    </section>
  </main>
  <script type="module" src="./digital-life.js"></script>
</body>
</html>
